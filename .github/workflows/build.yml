name: Build & Push

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GH_VERSION: 2.92.0
  TERRAFORM_VERSION: 1.15.1
  GO_VERSION: 1.26.2

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GH_VERSION=${{ env.GH_VERSION }}
            TERRAFORM_VERSION=${{ env.TERRAFORM_VERSION }}
            GO_VERSION=${{ env.GO_VERSION }}
          cache-from: type=gha,mode=max
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Inspect image
        run: |
          docker images ghcr.io/${{ github.repository }} --format \
            "{{.Repository}}:{{.Tag}}  {{.Size}}  {{.CreatedSince}}"

  test-container:
    name: Smoke-test
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          echo "Available tags:"
          docker images ghcr.io/${{ github.repository }}
          echo "Pulling: ${{ needs.build.outputs.image-tag }}"
          docker pull ${{ needs.build.outputs.image-tag }}

      - name: Start container (override entrypoint to skip startup)
        run: |
          docker run -d --rm \
            --name smoke-test \
            --privileged \
            -e TAILSCALE_AUTH_KEY=*** \
            ${{ needs.build.outputs.image-tag }} \
            tail -f /dev/null

      - name: Wait for startup
        run: sleep 2

      - name: Verify container is running
        run: docker ps --filter name=smoke-test

      - name: Verify binaries
        run: |
          docker exec smoke-test bash -c '
            set -e
            echo "=== Verifying binaries ==="
            gh version && echo "  ✓ gh"
            terraform version | head -1 && echo "  ✓ terraform"
            go version && echo "  ✓ go"
            rustc --version && echo "  ✓ rust"
            cargo --version && echo "  ✓ cargo"
            java -version 2>&1 | head -1 && echo "  ✓ java"
            mvn --version | head -1 && echo "  ✓ maven"
            ruby --version && echo "  ✓ ruby"
            dotnet --version && echo "  ✓ dotnet"
            php --version | head -1 && echo "  ✓ php"
            elixir --version | head -1 && echo "  ✓ elixir"
            npx wrangler --version && echo "  ✓ wrangler"
            erl -version 2>&1 | head -1 && echo "  ✓ erlang"
            playwright --version && echo "  ✓ playwright"
            echo "=== Binary check complete ==="
          '

      - name: GH auth status
        run: |
          docker exec smoke-test bash -c '
            if [[ -n "${GH_TOKEN:-}" ]]; then
              gh auth login --hostname github.com --token "$GH_TOKEN" || echo "GH login failed"
            fi
            gh auth status || echo "GH auth check done"
          '
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: docker stop smoke-test || true

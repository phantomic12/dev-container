name: Build & Push

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GH_VERSION: 2.63.0
  TERRAFORM_VERSION: 1.9.0

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build image
        run: |
          docker build \
            --build-arg GH_VERSION=${{ env.GH_VERSION }} \
            --build-arg TERRAFORM_VERSION=${{ env.TERRAFORM_VERSION }} \
            --tag ${{ steps.meta.outputs.tags }} \
            --provenance true \
            --sbom true \
            --push \
            .

      - name: Inspect image
        run: |
          docker images ghcr.io/${{ github.repository }}:${{ github.sha }} --format \
            "Image: {{.Repository}}:{{.Tag}}  Size: {{.Size}}  Created: {{.CreatedSince}}"

  test-container:
    name: Smoke-test
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_TAG: ghcr.io/${{ github.repository }}:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ env.IMAGE_TAG }}

      - name: Start container
        run: |
          docker run -d --rm \
            --name smoke-test \
            --privileged \
            -e TAILSCALE_AUTH_KEY=dummy \
            ${{ env.IMAGE_TAG }} \
            sleep infinity

      - name: Wait for startup
        run: sleep 15

      - name: Verify binaries
        run: |
          docker exec smoke-test bash -c '
            set -e
            echo "=== Verifying binaries ==="
            gh version && echo "  ✓ gh"
            terraform version | head -1 && echo "  ✓ terraform"
            playwright --version && echo "  ✓ playwright"
            puppeteer --version && echo "  ✓ puppeteer"
            echo ""
            echo "=== All binaries present ==="
          '

      - name: GH auth status
        run: |
          docker exec smoke-test bash -c '
            if [[ -n "${GH_TOKEN:-}" ]]; then
              gh auth login --hostname github.com --token "$GH_TOKEN"
            fi
            gh auth status
          '
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || '' }}

      - name: Cleanup
        if: always()
        run: docker stop smoke-test || true
